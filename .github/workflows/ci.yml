name: CI/CD

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

permissions:
  checks: write
  contents: read
  packages: write

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}
  NIX_FLAGS: "--accept-flake-config"

jobs:
  ci:
    name: "⚡ CI/CD"
    runs-on: [nix]
    steps:
      - name: Checkout
        run: |
          git init -q
          git remote add origin "https://github.com/${GITHUB_REPOSITORY}.git"
          git fetch --depth=1 -q origin "$GITHUB_SHA"
          git checkout -q FETCH_HEAD

      - name: Run checks
        id: checks
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          API="https://api.github.com/repos/${GITHUB_REPOSITORY}"
          AUTH="Authorization: token ${GH_TOKEN}"

          create_check() {
            local resp id
            resp=$(curl -s -X POST -H "$AUTH" -H "Accept: application/vnd.github+json" \
              "${API}/check-runs" \
              -d "{\"name\":\"$1\",\"head_sha\":\"${GITHUB_SHA}\",\"status\":\"in_progress\"}" 2>/dev/null) || true
            id=$(echo "$resp" | grep -oE '"id" *: *[0-9]+' | head -1 | grep -oE '[0-9]+') || true
            echo "${id:-0}"
          }

          finish_check() {
            [ "$1" = "0" ] || [ -z "$1" ] && return 0
            curl -s -X PATCH -H "$AUTH" -H "Accept: application/vnd.github+json" \
              "${API}/check-runs/$1" \
              -d "{\"status\":\"completed\",\"conclusion\":\"$2\"}" > /dev/null 2>&1 || true
          }

          FMT_CID=$(create_check "✅ Format")
          CHECK_CID=$(create_check "✅ Flake Check")
          BUILD_CID=$(create_check "📦 Build OCI")
          NIXIMG_CID=$(create_check "📦 Build oci-nix")

          run_task() {
            local cid=$1; shift
            if "$@" 2>&1; then
              finish_check "$cid" "success"; return 0
            else
              finish_check "$cid" "failure"; return 1
            fi
          }

          run_task "$FMT_CID" nix fmt $NIX_FLAGS -- --ci &
          FMT_PID=$!
          run_task "$CHECK_CID" nix flake check --no-build $NIX_FLAGS &
          CHECK_PID=$!
          run_task "$BUILD_CID" nix build .#oci-prod $NIX_FLAGS &
          BUILD_PID=$!
          run_task "$NIXIMG_CID" nix build .#oci-nix $NIX_FLAGS &
          NIXIMG_PID=$!

          FMT_RC=0;    wait $FMT_PID    || FMT_RC=$?
          CHECK_RC=0;   wait $CHECK_PID   || CHECK_RC=$?
          BUILD_RC=0;   wait $BUILD_PID   || BUILD_RC=$?
          NIXIMG_RC=0;  wait $NIXIMG_PID  || NIXIMG_RC=$?

          echo "fmt=$([ $FMT_RC -eq 0 ] && echo success || echo failure)" >> "$GITHUB_OUTPUT"
          echo "check=$([ $CHECK_RC -eq 0 ] && echo success || echo failure)" >> "$GITHUB_OUTPUT"
          echo "build=$([ $BUILD_RC -eq 0 ] && echo success || echo failure)" >> "$GITHUB_OUTPUT"
          echo "niximg=$([ $NIXIMG_RC -eq 0 ] && echo success || echo failure)" >> "$GITHUB_OUTPUT"

          [ $FMT_RC -eq 0 ] && [ $CHECK_RC -eq 0 ] && [ $BUILD_RC -eq 0 ] && [ $NIXIMG_RC -eq 0 ]

      - name: Login GHCR (skopeo)
        if: github.event_name == 'push' && github.ref == 'refs/heads/main' && steps.checks.outcome == 'success'
        env:
          REGISTRY_AUTH_FILE: /tmp/skopeo-auth.json
        run: |
          echo "${{ secrets.GITHUB_TOKEN }}" | \
            nix run .#skopeo $NIX_FLAGS -- login $REGISTRY -u ${{ github.actor }} --password-stdin

      - name: Push oci-prod (std) to GHCR
        if: github.event_name == 'push' && github.ref == 'refs/heads/main' && steps.checks.outcome == 'success'
        env:
          REGISTRY_AUTH_FILE: /tmp/skopeo-auth.json
        run: |
          REPO="${IMAGE_NAME,,}"
          SHORT="${GITHUB_SHA:0:7}"
          IMG_STD=$(nix build .#oci-prod $NIX_FLAGS --print-out-paths --no-link)
          nix run .#skopeo $NIX_FLAGS -- --insecure-policy copy \
            "nix:${IMG_STD}" "docker://${REGISTRY}/${REPO}:${SHORT}"
          nix run .#skopeo $NIX_FLAGS -- --insecure-policy copy \
            "nix:${IMG_STD}" "docker://${REGISTRY}/${REPO}:latest"

      - name: Push oci-nix to GHCR
        if: github.event_name == 'push' && github.ref == 'refs/heads/main' && steps.checks.outcome == 'success'
        env:
          REGISTRY_AUTH_FILE: /tmp/skopeo-auth.json
        run: |
          REPO="${IMAGE_NAME,,}"
          SHORT="${GITHUB_SHA:0:7}"
          SKOPEO=$(nix build nixpkgs#skopeo.out $NIX_FLAGS --print-out-paths --no-link)
          IMG_NIX=$(nix build .#oci-nix $NIX_FLAGS --print-out-paths --no-link)
          ${SKOPEO}/bin/skopeo --insecure-policy copy \
            "oci-archive:${IMG_NIX}" "docker://${REGISTRY}/${REPO}:${SHORT}-nix"
          ${SKOPEO}/bin/skopeo --insecure-policy copy \
            "oci-archive:${IMG_NIX}" "docker://${REGISTRY}/${REPO}:latest-nix"

      # Сначала app-nix на kubectl front (perturabo): иначе при падении шага app-std этот шаг не выполнялся бы.
      - name: Deploy app-nix (perturabo, kubectl front)
        id: deploy_nix
        if: github.event_name == 'push' && github.ref == 'refs/heads/main' && steps.checks.outcome == 'success'
        env:
          SSHPASS: ${{ secrets.SSH_PRIVATE_KEY }}
          SSH_DEPLOY_HOST: ${{ secrets.SSH_HOST }}
          SSH_DEPLOY_USER: ${{ secrets.SSH_USERNAME }}
          SSH_DEPLOY_PORT: ${{ secrets.SSH_PORT }}
        run: |
          if [ -z "$SSHPASS" ]; then
            echo "SSH_PRIVATE_KEY secret not set — skipping app-nix deploy"
            echo "deploy_nix=skipped" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          REPO="${IMAGE_NAME,,}"
          SHORT="${GITHUB_SHA:0:7}"
          IMG_NIX="${REGISTRY}/${REPO}:${SHORT}-nix"
          PORT="${SSH_DEPLOY_PORT:-22}"

          OPENSSH=$(nix build nixpkgs#openssh.out $NIX_FLAGS --print-out-paths --no-link)
          SSHPASS_BIN=$(nix build nixpkgs#sshpass.out $NIX_FLAGS --print-out-paths --no-link)/bin/sshpass
          export PATH="${OPENSSH}/bin:${PATH}"

          test -f k8s/deployment-back.yaml

          $SSHPASS_BIN -e ssh -o StrictHostKeyChecking=no -o UserKnownHostsFile=/dev/null \
            -o PreferredAuthentications=password -o PubkeyAuthentication=no \
            -p "$PORT" \
            "${SSH_DEPLOY_USER}@${SSH_DEPLOY_HOST}" \
            "set -e; \
             kubectl --context front apply -f - -n default; \
             kubectl --context front delete deployment/app-std -n default --ignore-not-found; \
             kubectl --context front set image deployment/app-nix -n default app=${IMG_NIX}; \
             if ! kubectl --context front rollout status deployment/app-nix -n default --timeout=300s; then \
               echo 'WARN: app-nix rollout not ready, recycling nix pods once (containerd/nix-snapshotter race?)'; \
               kubectl --context front delete pod -n default -l app=python-uv-nix,variant=nix --ignore-not-found; \
               kubectl --context front rollout status deployment/app-nix -n default --timeout=300s || echo 'WARN: app-nix rollout still not ready (checkpoint race / image pull?)'; \
             fi; \
             echo \"Deployed app-nix on front (perturabo)=${IMG_NIX}\"" \
            < k8s/deployment-back.yaml

          echo "deploy_nix=success" >> "$GITHUB_OUTPUT"

      - name: Deploy app-std (angron, kubectl back)
        id: deploy_std
        if: github.event_name == 'push' && github.ref == 'refs/heads/main' && steps.checks.outcome == 'success'
        env:
          # Имя секрета историческое: здесь лежит пароль root jump-хоста (не PEM-ключ).
          SSHPASS: ${{ secrets.SSH_PRIVATE_KEY }}
          SSH_DEPLOY_HOST: ${{ secrets.SSH_HOST }}
          SSH_DEPLOY_USER: ${{ secrets.SSH_USERNAME }}
          SSH_DEPLOY_PORT: ${{ secrets.SSH_PORT }}
        run: |
          if [ -z "$SSHPASS" ]; then
            echo "SSH_PRIVATE_KEY secret not set — skipping app-std deploy"
            echo "deploy_std=skipped" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          REPO="${IMAGE_NAME,,}"
          SHORT="${GITHUB_SHA:0:7}"
          IMG_STD="${REGISTRY}/${REPO}:${SHORT}"
          PORT="${SSH_DEPLOY_PORT:-22}"

          OPENSSH=$(nix build nixpkgs#openssh.out $NIX_FLAGS --print-out-paths --no-link)
          SSHPASS_BIN=$(nix build nixpkgs#sshpass.out $NIX_FLAGS --print-out-paths --no-link)/bin/sshpass
          export PATH="${OPENSSH}/bin:${PATH}"

          test -f k8s/deployment-front.yaml

          $SSHPASS_BIN -e ssh -o StrictHostKeyChecking=no -o UserKnownHostsFile=/dev/null \
            -o PreferredAuthentications=password -o PubkeyAuthentication=no \
            -p "$PORT" \
            "${SSH_DEPLOY_USER}@${SSH_DEPLOY_HOST}" \
            "set -e; \
             kubectl --context back apply -f - -n default; \
             kubectl --context back delete deployment/app-nix -n default --ignore-not-found; \
             kubectl --context back set image deployment/app-std -n default app=${IMG_STD}; \
             kubectl --context back rollout status deployment/app-std -n default --timeout=300s; \
             echo \"Deployed app-std on back (angron)=${IMG_STD}\"" \
            < k8s/deployment-front.yaml

          echo "deploy_std=success" >> "$GITHUB_OUTPUT"

      - name: Summary
        if: always()
        run: |
          FMT="${{ steps.checks.outputs.fmt }}"
          CHK="${{ steps.checks.outputs.check }}"
          BLD="${{ steps.checks.outputs.build }}"
          NIXIMG="${{ steps.checks.outputs.niximg }}"
          DSTD="${{ steps.deploy_std.outputs.deploy_std }}"
          DNIX="${{ steps.deploy_nix.outputs.deploy_nix }}"

          {
            echo "## CI/CD Results"
            echo ""
            echo "| Check | Result |"
            echo "|-------|--------|"
            echo "| Format | $([ "$FMT" = success ] && echo '✅' || echo '❌') |"
            echo "| Flake Check | $([ "$CHK" = success ] && echo '✅' || echo '❌') |"
            echo "| Build OCI | $([ "$BLD" = success ] && echo '✅' || echo '❌') |"
            echo "| Build oci-nix | $([ "$NIXIMG" = success ] && echo '✅' || echo '❌') |"
            if [ -n "$DNIX" ]; then
              echo "| Deploy app-nix (front / perturabo) | $([ "$DNIX" = success ] && echo '✅' || echo "⚠️ $DNIX") |"
            fi
            if [ -n "$DSTD" ]; then
              echo "| Deploy app-std (back / angron) | $([ "$DSTD" = success ] && echo '✅' || echo "⚠️ $DSTD") |"
            fi
          } >> "$GITHUB_STEP_SUMMARY"

name: CI

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

permissions:
  contents: read
  packages: write

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: DeterminateSystems/nix-installer-action@main
      - uses: DeterminateSystems/magic-nix-cache-action@main

      - name: Check flake
        run: nix flake check --no-build

      - name: Format check
        run: nix fmt -- --check

      - name: Build OCI image
        run: nix build .#oci-prod

  deploy:
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    needs: check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: DeterminateSystems/nix-installer-action@main
      - uses: DeterminateSystems/magic-nix-cache-action@main

      - name: Build OCI image
        run: nix build .#oci-prod

      - name: Push to GHCR
        run: |
          SKOPEO=$(nix build nixpkgs#skopeo --print-out-paths --no-link)
          IMAGE="ghcr.io/$(echo '${{ github.repository }}' | tr '[:upper:]' '[:lower:]')"
          SHA="${GITHUB_SHA::7}"

          echo "${{ secrets.GITHUB_TOKEN }}" | \
            ${SKOPEO}/bin/skopeo login ghcr.io -u "${{ github.actor }}" --password-stdin

          ${SKOPEO}/bin/skopeo copy oci-archive:./result "docker://${IMAGE}:${SHA}"
          ${SKOPEO}/bin/skopeo copy oci-archive:./result "docker://${IMAGE}:latest"

      - name: Deploy
        env:
          SSH_KEY: ${{ secrets.SSH_PRIVATE_KEY }}
        run: |
          eval "$(ssh-agent -s)"
          ssh-add - <<< "$SSH_KEY"

          IMAGE="ghcr.io/$(echo '${{ github.repository }}' | tr '[:upper:]' '[:lower:]')"
          SHA="${GITHUB_SHA::7}"

          ssh -o StrictHostKeyChecking=no -o UserKnownHostsFile=/dev/null \
            -p ${{ secrets.SSH_PORT }} \
            ${{ secrets.SSH_USERNAME }}@${{ secrets.SSH_HOST }} \
            bash -s "${IMAGE}" "${SHA}" << 'DEPLOY_EOF'
          set -e
          IMG="$1:$2"
          kubectl set image deployment/python-uv-nix -n default app=${IMG}
          kubectl rollout status deployment/python-uv-nix -n default --timeout=120s
          echo "Deployed ${IMG}"
          DEPLOY_EOF

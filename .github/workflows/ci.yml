name: CI/CD

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

permissions:
  checks: write
  contents: read
  packages: write

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}
  NIX_FLAGS: "--accept-flake-config"

jobs:
  ci:
    name: "⚡ CI/CD"
    runs-on: [nix]
    steps:
      - name: Checkout
        run: |
          git init -q
          git remote add origin "https://github.com/${GITHUB_REPOSITORY}.git"
          git fetch --depth=1 -q origin "$GITHUB_SHA"
          git checkout -q FETCH_HEAD

      - name: Run checks
        id: checks
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          API="https://api.github.com/repos/${GITHUB_REPOSITORY}"
          AUTH="Authorization: token ${GH_TOKEN}"

          create_check() {
            local id
            id=$(curl -sf -X POST -H "$AUTH" -H "Accept: application/vnd.github+json" \
              "${API}/check-runs" \
              -d "{\"name\":\"$1\",\"head_sha\":\"${GITHUB_SHA}\",\"status\":\"in_progress\"}" \
              | grep -o '"id":[0-9]*' | head -1 | grep -o '[0-9]*')
            echo "$id"
          }

          finish_check() {
            curl -sf -X PATCH -H "$AUTH" -H "Accept: application/vnd.github+json" \
              "${API}/check-runs/$1" \
              -d "{\"status\":\"completed\",\"conclusion\":\"$2\"}" > /dev/null
          }

          FMT_CID=$(create_check "✅ Format")
          CHECK_CID=$(create_check "✅ Flake Check")
          BUILD_CID=$(create_check "📦 Build OCI")

          run_and_report() {
            local cid=$1; shift
            if "$@"; then
              finish_check "$cid" "success"; return 0
            else
              finish_check "$cid" "failure"; return 1
            fi
          }

          run_and_report "$FMT_CID" nix fmt $NIX_FLAGS -- --ci &
          FMT_PID=$!
          run_and_report "$CHECK_CID" nix flake check --no-build $NIX_FLAGS &
          CHECK_PID=$!
          run_and_report "$BUILD_CID" nix build .#oci-prod $NIX_FLAGS &
          BUILD_PID=$!

          FMT_RC=0;   wait $FMT_PID   || FMT_RC=$?
          CHECK_RC=0;  wait $CHECK_PID  || CHECK_RC=$?
          BUILD_RC=0;  wait $BUILD_PID  || BUILD_RC=$?

          echo "fmt=$([ $FMT_RC -eq 0 ] && echo success || echo failure)" >> "$GITHUB_OUTPUT"
          echo "check=$([ $CHECK_RC -eq 0 ] && echo success || echo failure)" >> "$GITHUB_OUTPUT"
          echo "build=$([ $BUILD_RC -eq 0 ] && echo success || echo failure)" >> "$GITHUB_OUTPUT"

          [ $FMT_RC -eq 0 ] && [ $CHECK_RC -eq 0 ] && [ $BUILD_RC -eq 0 ]

      - name: Push to GHCR
        if: github.event_name == 'push' && github.ref == 'refs/heads/main' && steps.checks.outcome == 'success'
        env:
          REGISTRY_AUTH_FILE: /tmp/skopeo-auth.json
        run: |
          echo "${{ secrets.GITHUB_TOKEN }}" | \
            nix run .#skopeo $NIX_FLAGS -- login $REGISTRY -u ${{ github.actor }} --password-stdin

          IMG=$(nix build .#oci-prod $NIX_FLAGS --print-out-paths --no-link)
          REPO="${IMAGE_NAME,,}"
          SHORT="${GITHUB_SHA:0:7}"

          nix run .#skopeo $NIX_FLAGS -- --insecure-policy copy \
            "nix:$IMG" "docker://${REGISTRY}/${REPO}:${SHORT}"
          nix run .#skopeo $NIX_FLAGS -- --insecure-policy copy \
            "nix:$IMG" "docker://${REGISTRY}/${REPO}:latest"

      - name: Summary
        if: always()
        run: |
          FMT="${{ steps.checks.outputs.fmt }}"
          CHK="${{ steps.checks.outputs.check }}"
          BLD="${{ steps.checks.outputs.build }}"

          {
            echo "## CI/CD Results"
            echo ""
            echo "| Check | Result |"
            echo "|-------|--------|"
            echo "| Format | $([ "$FMT" = success ] && echo '✅' || echo '❌') |"
            echo "| Flake Check | $([ "$CHK" = success ] && echo '✅' || echo '❌') |"
            echo "| Build OCI | $([ "$BLD" = success ] && echo '✅' || echo '❌') |"
          } >> "$GITHUB_STEP_SUMMARY"

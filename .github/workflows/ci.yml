name: CI/CD

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}
  NIX_FLAGS: "--accept-flake-config"

jobs:
  ci:
    name: "🔍 Check & Build"
    runs-on: [self-hosted, nix]
    steps:
      - uses: actions/checkout@v4

      - name: Setup Nix cache
        run: |
          SHARED="/var/cache/nix-runners-shared/nix"
          LOCAL="$HOME/.cache/nix"
          mkdir -p "$LOCAL"
          # Symlink shared eval/git caches for cross-project reuse;
          # fetcher-cache stays per-runner to avoid SQLite readonly errors.
          for sub in eval-cache-v6 gitv3; do
            [ -d "$SHARED/$sub" ] && ln -sfn "$SHARED/$sub" "$LOCAL/$sub" || true
          done
          # Fix permissions on shared caches so this runner UID can write
          chmod a+rw "$SHARED"/fetcher-cache-v4.sqlite* 2>/dev/null || true
          find "$SHARED/eval-cache-v6" -type f -exec chmod a+rw {} + 2>/dev/null || true

      - name: Check, lint & build
        run: |
          nix flake check --no-build $NIX_FLAGS &
          CHECK_PID=$!
          nix fmt $NIX_FLAGS -- --ci &
          FMT_PID=$!
          nix build .#oci-prod $NIX_FLAGS &
          BUILD_PID=$!
          wait $CHECK_PID
          wait $FMT_PID
          wait $BUILD_PID

      - name: Build summary
        run: |
          echo "## 📦 OCI Image" >> $GITHUB_STEP_SUMMARY
          SIZE=$(nix path-info -Sh ./result 2>/dev/null | awk '{print $2}' || echo "?")
          echo "Closure size: **$SIZE**" >> $GITHUB_STEP_SUMMARY

  push:
    name: "🚀 Push to GHCR"
    runs-on: [self-hosted, nix]
    needs: ci
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    permissions:
      contents: read
      packages: write
    env:
      REGISTRY_AUTH_FILE: /tmp/skopeo-auth.json
    steps:
      - uses: actions/checkout@v4

      - name: Setup Nix cache
        run: |
          SHARED="/var/cache/nix-runners-shared/nix"
          LOCAL="$HOME/.cache/nix"
          mkdir -p "$LOCAL"
          for sub in eval-cache-v6 gitv3; do
            [ -d "$SHARED/$sub" ] && ln -sfn "$SHARED/$sub" "$LOCAL/$sub" || true
          done
          chmod a+rw "$SHARED"/fetcher-cache-v4.sqlite* 2>/dev/null || true
          find "$SHARED/eval-cache-v6" -type f -exec chmod a+rw {} + 2>/dev/null || true

      - name: Login to GHCR
        run: |
          echo "${{ secrets.GITHUB_TOKEN }}" | \
            nix run .#skopeo $NIX_FLAGS -- login ${{ env.REGISTRY }} \
              -u ${{ github.actor }} --password-stdin

      - name: Push image
        run: |
          IMG=$(nix build .#oci-prod $NIX_FLAGS --print-out-paths --no-link)
          SHA="${{ github.sha }}"
          SHORT="${SHA:0:7}"
          REPO="${IMAGE_NAME,,}"

          nix run .#skopeo $NIX_FLAGS -- --insecure-policy copy \
            "nix:$IMG" \
            "docker://${{ env.REGISTRY }}/${REPO}:${SHORT}"

          nix run .#skopeo $NIX_FLAGS -- --insecure-policy copy \
            "nix:$IMG" \
            "docker://${{ env.REGISTRY }}/${REPO}:latest"

          echo "## 🚀 Pushed to GHCR" >> $GITHUB_STEP_SUMMARY
          echo "- \`${{ env.REGISTRY }}/${REPO}:${SHORT}\`" >> $GITHUB_STEP_SUMMARY
          echo "- \`${{ env.REGISTRY }}/${REPO}:latest\`" >> $GITHUB_STEP_SUMMARY

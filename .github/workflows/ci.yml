name: CI/CD

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

permissions:
  checks: write
  contents: read
  packages: write

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}

jobs:
  ci:
    name: "⚡ CI/CD"
    runs-on: [nix]
    steps:
      - name: Checkout
        run: |
          git init -q
          git remote add origin "https://github.com/${GITHUB_REPOSITORY}.git"
          git fetch --depth=1 -q origin "$GITHUB_SHA"
          git checkout -q FETCH_HEAD

      - name: Run checks
        id: checks
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          API="https://api.github.com/repos/${GITHUB_REPOSITORY}"
          AUTH="Authorization: token ${GH_TOKEN}"

          create_check() {
            local resp id
            resp=$(curl -s -X POST -H "$AUTH" -H "Accept: application/vnd.github+json" \
              "${API}/check-runs" \
              -d "{\"name\":\"$1\",\"head_sha\":\"${GITHUB_SHA}\",\"status\":\"in_progress\"}" 2>/dev/null) || true
            id=$(echo "$resp" | grep -oE '"id" *: *[0-9]+' | head -1 | grep -oE '[0-9]+') || true
            echo "${id:-0}"
          }

          finish_check() {
            [ "$1" = "0" ] || [ -z "$1" ] && return 0
            curl -s -X PATCH -H "$AUTH" -H "Accept: application/vnd.github+json" \
              "${API}/check-runs/$1" \
              -d "{\"status\":\"completed\",\"conclusion\":\"$2\"}" > /dev/null 2>&1 || true
          }

          FMT_CID=$(create_check "✅ Format")
          CHECK_CID=$(create_check "✅ Flake Check")
          BUILD_CID=$(create_check "📦 Build OCI")

          run_task() {
            local cid=$1; shift
            if "$@" 2>&1; then
              finish_check "$cid" "success"; return 0
            else
              finish_check "$cid" "failure"; return 1
            fi
          }

          run_task "$FMT_CID" nix fmt -- --ci &
          FMT_PID=$!
          run_task "$CHECK_CID" nix flake check --no-build &
          CHECK_PID=$!
          run_task "$BUILD_CID" nix build .#oci-prod &
          BUILD_PID=$!

          FMT_RC=0;    wait $FMT_PID    || FMT_RC=$?
          CHECK_RC=0;   wait $CHECK_PID   || CHECK_RC=$?
          BUILD_RC=0;   wait $BUILD_PID   || BUILD_RC=$?

          echo "fmt=$([ $FMT_RC -eq 0 ] && echo success || echo failure)" >> "$GITHUB_OUTPUT"
          echo "check=$([ $CHECK_RC -eq 0 ] && echo success || echo failure)" >> "$GITHUB_OUTPUT"
          echo "build=$([ $BUILD_RC -eq 0 ] && echo success || echo failure)" >> "$GITHUB_OUTPUT"

          [ $FMT_RC -eq 0 ] && [ $CHECK_RC -eq 0 ] && [ $BUILD_RC -eq 0 ]

      - name: Push to GHCR
        if: github.event_name == 'push' && github.ref == 'refs/heads/main' && steps.checks.outcome == 'success'
        env:
          REGISTRY_AUTH_FILE: /tmp/skopeo-auth.json
        run: |
          SKOPEO=$(nix build nixpkgs#skopeo --print-out-paths --no-link)

          echo "${{ secrets.GITHUB_TOKEN }}" | \
            ${SKOPEO}/bin/skopeo login $REGISTRY -u ${{ github.actor }} --password-stdin

          IMG=$(nix build .#oci-prod --print-out-paths --no-link)
          REPO="${IMAGE_NAME,,}"
          SHORT="${GITHUB_SHA:0:7}"

          ${SKOPEO}/bin/skopeo --insecure-policy copy \
            "oci-archive:${IMG}" "docker://${REGISTRY}/${REPO}:${SHORT}"
          ${SKOPEO}/bin/skopeo --insecure-policy copy \
            "oci-archive:${IMG}" "docker://${REGISTRY}/${REPO}:latest"

      - name: Deploy
        id: deploy
        if: github.event_name == 'push' && github.ref == 'refs/heads/main' && steps.checks.outcome == 'success'
        env:
          SSH_KEY: ${{ secrets.SSH_PRIVATE_KEY }}
        run: |
          if [ -z "$SSH_KEY" ]; then
            echo "SSH_PRIVATE_KEY secret not set — skipping deploy"
            echo "deployed=skipped" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          REPO="${IMAGE_NAME,,}"
          SHORT="${GITHUB_SHA:0:7}"
          IMG="${REGISTRY}/${REPO}:${SHORT}"

          eval "$(ssh-agent -s)"
          ssh-add - <<< "$SSH_KEY"

          ssh -o StrictHostKeyChecking=no -o UserKnownHostsFile=/dev/null \
            -p ${{ secrets.SSH_PORT }} \
            ${{ secrets.SSH_USERNAME }}@${{ secrets.SSH_HOST }} \
            bash -s "${IMG}" << 'DEPLOY_EOF'
          set -e
          kubectl set image deployment/python-uv-nix -n default app=$1
          kubectl rollout status deployment/python-uv-nix -n default --timeout=120s
          echo "Deployed $1"
          DEPLOY_EOF

          echo "deployed=success" >> "$GITHUB_OUTPUT"

      - name: Summary
        if: always()
        run: |
          FMT="${{ steps.checks.outputs.fmt }}"
          CHK="${{ steps.checks.outputs.check }}"
          BLD="${{ steps.checks.outputs.build }}"
          DEPLOY="${{ steps.deploy.outputs.deployed }}"

          {
            echo "## CI/CD Results"
            echo ""
            echo "| Check | Result |"
            echo "|-------|--------|"
            echo "| Format | $([ "$FMT" = success ] && echo '✅' || echo '❌') |"
            echo "| Flake Check | $([ "$CHK" = success ] && echo '✅' || echo '❌') |"
            echo "| Build OCI | $([ "$BLD" = success ] && echo '✅' || echo '❌') |"
            if [ -n "$DEPLOY" ]; then
              echo "| Deploy | $([ "$DEPLOY" = success ] && echo '✅' || echo "⚠️ $DEPLOY") |"
            fi
          } >> "$GITHUB_STEP_SUMMARY"

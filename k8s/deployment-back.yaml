# Back cluster: nix-snapshotter образ (app-nix) + Service
# kubectl --context back apply -f k8s/deployment-back.yaml
apiVersion: v1
kind: Service
metadata:
  name: python-uv-nix
  labels:
    app: python-uv-nix
spec:
  selector:
    app: python-uv-nix
  ports:
    - protocol: TCP
      port: 80
      targetPort: 8000
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: app-nix
  labels:
    app: python-uv-nix
    variant: nix
spec:
  replicas: 1
  selector:
    matchLabels:
      app: python-uv-nix
      variant: nix
  template:
    metadata:
      labels:
        app: python-uv-nix
        variant: nix
    spec:
      nodeSelector:
        nix-snapshotter: "true"
      containers:
        - name: app
          image: app-nix:latest
          resources:
            requests:
              memory: "64Mi"
              cpu: "50m"
            limits:
              memory: "256Mi"
              cpu: "200m"

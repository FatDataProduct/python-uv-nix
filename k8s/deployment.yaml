# nix-snapshotter Deployment for perturabo
#
# Image reference (__NIX_IMAGE__) is substituted by CI/CD
# with the actual nix:0<store-path> from `nix build .#nix-image`.
#
# nodeSelector ensures scheduling only on nodes with nix-snapshotter.
apiVersion: apps/v1
kind: Deployment
metadata:
  name: python-uv-nix
  labels:
    app: python-uv-nix
    deployed-by: nix-snapshotter
spec:
  replicas: 1
  selector:
    matchLabels:
      app: python-uv-nix
  template:
    metadata:
      labels:
        app: python-uv-nix
    spec:
      nodeSelector:
        nix-snapshotter: "true"
      containers:
        - name: app
          image: __NIX_IMAGE__
          resources:
            requests:
              memory: "64Mi"
              cpu: "50m"
            limits:
              memory: "256Mi"
              cpu: "200m"

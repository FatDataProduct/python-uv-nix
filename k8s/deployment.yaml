# Two Deployments + shared Service
#
# app-std  — n2c image, runs on any node
# app-nix  — nix-snapshotter image, only on nodes with label nix-snapshotter=true
#
# Images are set by CI via `kubectl set image`.
apiVersion: v1
kind: Service
metadata:
  name: python-uv-nix
  labels:
    app: python-uv-nix
spec:
  selector:
    app: python-uv-nix
  ports:
    - protocol: TCP
      port: 80
      targetPort: 8000
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: app-std
  labels:
    app: python-uv-nix
    variant: std
spec:
  replicas: 1
  selector:
    matchLabels:
      app: python-uv-nix
      variant: std
  template:
    metadata:
      labels:
        app: python-uv-nix
        variant: std
    spec:
      containers:
        - name: app
          image: app:latest
          resources:
            requests:
              memory: "64Mi"
              cpu: "50m"
            limits:
              memory: "256Mi"
              cpu: "200m"
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: app-nix
  labels:
    app: python-uv-nix
    variant: nix
spec:
  replicas: 1
  selector:
    matchLabels:
      app: python-uv-nix
      variant: nix
  template:
    metadata:
      labels:
        app: python-uv-nix
        variant: nix
    spec:
      nodeSelector:
        nix-snapshotter: "true"
      containers:
        - name: app
          image: app-nix:latest
          resources:
            requests:
              memory: "64Mi"
              cpu: "50m"
            limits:
              memory: "256Mi"
              cpu: "200m"

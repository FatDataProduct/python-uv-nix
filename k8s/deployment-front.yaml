# n2c (app-std) — кластер angron: kubectl --context back apply -f k8s/deployment-front.yaml
# (имя файла «front» историческое; в проде этот манифест идёт на контекст back.)
apiVersion: v1
kind: Service
metadata:
  name: python-uv-nix
  labels:
    app: python-uv-nix
spec:
  selector:
    app: python-uv-nix
  ports:
    - protocol: TCP
      port: 80
      targetPort: 8000
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: app-std
  labels:
    app: python-uv-nix
    variant: std
spec:
  replicas: 1
  selector:
    matchLabels:
      app: python-uv-nix
      variant: std
  template:
    metadata:
      labels:
        app: python-uv-nix
        variant: std
    spec:
      containers:
        - name: app
          image: app:latest
          resources:
            requests:
              memory: "64Mi"
              cpu: "50m"
            limits:
              memory: "256Mi"
              cpu: "200m"
